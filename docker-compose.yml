# PromptLens — one command for Mac & Windows (Docker Desktop)
#
#   cp .env.example .env   # optional: set OPENAI_API_KEY
#   docker compose up --build
#
# UI:  http://localhost:8080
# API: http://localhost:8000  (also proxied via UI at /v1 and /health)

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: promptlens-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/promptlens.db
      CORS_ORIGINS: http://127.0.0.1:8080,http://localhost:8080,http://127.0.0.1:5173,http://localhost:5173
      ALLOW_HEURISTIC_FALLBACK: "true"
      PROCESSING_PROVIDER: ${PROCESSING_PROVIDER:-auto}
      IMPROVER_MODEL: ${IMPROVER_MODEL:-gpt-4.1-mini}
      JUDGE_MODEL: ${JUDGE_MODEL:-gpt-4.1-mini}
      TARGET_MODEL: ${TARGET_MODEL:-gpt-4.1-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      # Reach Ollama on the host (Docker Desktop Mac/Windows; Linux via extra_hosts)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
    volumes:
      - promptlens-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: ""
    container_name: promptlens-web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  promptlens-data:
